<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor">
  <!-- Outer frame with notched corners -->
  <rect x="8" y="8" width="184" height="184"/>
  <line x1="8" y1="20" x2="20" y2="8"/>
  <line x1="180" y1="8" x2="192" y2="20"/>
  <line x1="192" y1="180" x2="180" y2="192"/>
  <line x1="20" y1="192" x2="8" y2="180"/>

  <!-- Constellation lines — drawn first so star dots overprint cleanly -->
  <!-- shoulders to belt -->
  <line x1="55"  y1="55"  x2="78"  y2="112"/>
  <line x1="148" y1="62"  x2="124" y2="106"/>
  <!-- belt -->
  <line x1="78"  y1="112" x2="100" y2="109"/>
  <line x1="100" y1="109" x2="124" y2="106"/>
  <!-- feet to belt -->
  <line x1="55"  y1="172" x2="78"  y2="112"/>
  <line x1="148" y1="168" x2="124" y2="106"/>
  <!-- head to shoulders -->
  <line x1="95"  y1="30"  x2="55"  y2="55"/>
  <line x1="95"  y1="30"  x2="148" y2="62"/>
  <!-- sword hanging from belt -->
  <line x1="100" y1="109" x2="100" y2="155"/>

  <!-- Bow held up on Orion's right side (viewer's right) — graceful arc -->
  <path d="M 175 55 Q 195 113 175 175"/>
  <path d="M 170 65 Q 188 113 170 165"/>
  <!-- Bowstring -->
  <line x1="175" y1="55" x2="175" y2="175"/>

  <!-- Stars as small circles, sized by approximate magnitude -->
  <circle cx="148" cy="168" r="3.0"/>   <!-- Rigel (brightest) -->
  <circle cx="55"  cy="55"  r="2.7"/>   <!-- Betelgeuse -->
  <circle cx="100" cy="109" r="2.3"/>   <!-- Alnilam (belt center) -->
  <circle cx="124" cy="106" r="2.2"/>   <!-- Mintaka -->
  <circle cx="78"  cy="112" r="2.2"/>   <!-- Alnitak -->
  <circle cx="148" cy="62"  r="2.0"/>   <!-- Bellatrix -->
  <circle cx="55"  cy="172" r="2.0"/>   <!-- Saiph -->
  <circle cx="95"  cy="30"  r="1.5"/>   <!-- Meissa (head) -->
  <!-- Sword stars -->
  <circle cx="100" cy="130" r="1.4"/>
  <circle cx="100" cy="145" r="1.8"/>   <!-- M42 nebula -->
  <circle cx="100" cy="155" r="1.3"/>

  <!-- Field stars scattered around (random-ish background) -->
  <circle cx="30"  cy="40"  r="0.8"/>
  <circle cx="170" cy="30"  r="1.0"/>
  <circle cx="25"  cy="100" r="0.9"/>
  <circle cx="20"  cy="155" r="0.8"/>
  <circle cx="40"  cy="125" r="0.7"/>
  <circle cx="115" cy="50"  r="0.9"/>
  <circle cx="135" cy="160" r="0.8"/>
  <circle cx="160" cy="120" r="0.9"/>
  <circle cx="80"  cy="180" r="0.8"/>
  <circle cx="125" cy="180" r="0.7"/>
  <circle cx="155" cy="98"  r="0.6"/>
  <circle cx="65"  cy="85"  r="0.7"/>
</svg>
